<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

    body {
        background-color: #f3e9e0;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        border-radius: 16px;
        overflow: hidden;
        background: white;
        box-shadow: 0 10px 16px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
    }

    thead tr {
        background-color: #a8e6cf;
    }

    tr,
    td {
        font-family: 'Poppins', sans-serif;
        font-size: 18px;
        text-align: center;
        padding: 10px;
        color: black;
    }

    tr:nth-child(even) {
        background: whitesmoke;
    }

    img {
        width: 100%;
    }

    .logo-container {
        max-width: 200px;
        width: 100%;
        padding-bottom: 20px;
    }

    .state-completed {
        background-color: lightgreen;
    }

    h1 {
        font-family: "Inter", system-ui, sans-serif;
        color: crimson;
    }

    .td-done {
        width: 100%;
        height: 25px;
        background-color: lightgreen;
        border-radius: 14px;
    }

    .main-container {
        display: flex;
        gap: 10px;
        align-items: flex-start;
    }

    #main-table {
        flex: 1;
    }

    #finished-tasks-table {
        flex: 1;
    }

    #main-table,
    #finished-tasks-table {
        min-width: 0;
    }

    .header-container {
        display: flex;
        gap: 300px;
    }
</style>

<body>

    <div class="header-container">
        <div class="logo-container">
            <img src="keralogo.png" />
        </div>
        <div>
            <p style="font-size: 30px;">J&auml;rjekord n&auml;dalates: <span id="queue-in-weeks">0</span></p>
        </div>
        <div>
            <p style="font-size: 30px;">Luuke kokku: <span id="total-hatches-amount">0</span></p>
        </div>
    </div>

    <div class="main-container">

        <table id="main-table">
            <thead>
                <tr>
                    <td>Nr.</td>
                    <td>Mat.</td>
                    <td>SO</td>
                    <td>Objekt</td>
                    <td width="900">T&ouml;&ouml;k&auml;sk</td>
                    <td>Tk</td>
                    <td>L</td>
                    <td>N</td>
                    <td>P</td>
                    <td>K</td>
                    <td>Valmis</td>
                    <td>Puudused</td>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>

        <table id="finished-tasks-table">
            <thead>
                <tr>
                    <td>Nr.</td>
                    <td>Mat.</td>
                    <td>SO</td>
                    <td>Objekt</td>
                    <td>T&ouml;&ouml;k&auml;sk</td>
                    <td>Tk</td>
                    <td>Valmis</td>
                    <td>Puudused</td>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>

    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="init.js"></script>

</body>

<script type="module">
    import { getOrders } from "./data-helper.js";

    await calculateData();

    const intervalID = setInterval(calculateData, 10000)

    async function calculateData() {


        let orders = await getOrders();

        let totalAmount = 0;
        for (let order of orders) {

            if (order.getStatus() != null) {
                if (order.getStatus().toLowerCase() == "x") {
                    continue;
                }
            }

            if (!order.containsComment("valmis") && !order.isRemoved())
                totalAmount += order.getAmount();
        }

        let queueInWeeks = totalAmount / 55;

        document.getElementById("queue-in-weeks").innerText = queueInWeeks.toFixed(1);
        document.getElementById("total-hatches-amount").innerText = totalAmount;
    }
</script>

</html>
